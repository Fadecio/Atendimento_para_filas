<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>QueuePro</title>
  <link rel="stylesheet" href="src/css/reset.css">
  <link rel="stylesheet" href="src/css/global.css">
</head>
<body>

  <div class="app">

    <header>
      <h1>QueuePro</h1>
      <span>Gestão de Atendimento</span>
    </header>

    <main class="card">

      <div class="input-group">
        <input type="text" id="nome" placeholder="Nome do cliente...">
        <button onclick="adicionar()">Adicionar</button>
        <button class="priority" onclick="adicionar('prioridade')">Prioridade</button>
      </div>

      <div class="actions">
        <button onclick="atenderPessoa()">Atender</button>
        <button class="danger" onclick="limpar()">Limpar</button>
      </div>

      <div class="info">
        <p id="contador"></p>
      </div>

      <ul id="lista"></ul>

    </main>

  </div>

<script src="src/js/funcao.js"></script>
</body>
</html>
