<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QueuePro</title>
    <link rel="stylesheet" href="src/css/reset.css" />
    <link rel="stylesheet" href="src/css/global.css" />
  </head>
  <body>
    <div class="app">
      <header>
        <h1>QueuePro</h1>
        <span>Gestão de Atendimento</span>
      </header>

      <main class="card">
        <div class="input-group">
          <input type="text" id="nome" placeholder="Nome do cliente..." />
          <button id="btn-adicionar">Adicionar</button>
          <button id="btn-prioridade" class="priority">Prioridade</button>
        </div>

        <div class="actions">
          <button id="btn-atender" class="atender">Atender</button>
          <button id="btn-limpar" class="danger">Limpar</button>
        </div>

        <div class="info">
          <p id="contador"></p>
        </div>

        <ul id="lista"></ul>
      </main>
    </div>

    <script type="module" src="src/js/main.js"></script>
  </body>
</html>
